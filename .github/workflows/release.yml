name: Release APK

# Builds a signed Android release APK in CI and publishes it to a GitHub
# Release. Triggered by pushing a version tag (e.g. v0.1.0). The build is fully
# reproducible from the tagged commit — the only inputs that aren't in the repo
# are the signing secrets, supplied via encrypted Actions secrets.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :androidApp:assembleRelease --no-daemon --stacktrace

      - name: Stage release artifacts
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          apk=$(find androidApp/build/outputs/apk/release -name '*.apk' | head -1)
          mkdir -p dist
          cp "$apk" "dist/daily-dozen-${version}.apk"
          ( cd dist && sha256sum "daily-dozen-${version}.apk" > "daily-dozen-${version}.apk.sha256" )
          echo "Staged:"; ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
