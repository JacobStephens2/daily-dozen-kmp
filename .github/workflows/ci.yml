name: CI

# Proves the shared Compose Multiplatform code compiles and assembles on every
# push and PR, for both the Android and the web (Wasm) targets. iOS is built
# only on macOS/Xcode and is therefore out of scope for this Linux runner.
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Assemble Android (debug)
        run: ./gradlew :androidApp:assembleDebug --no-daemon --stacktrace

      - name: Build web (Wasm) distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon --stacktrace
