name: CI

# Proves the shared Compose Multiplatform code compiles and assembles on every
# push and PR, for both the Android and the web (Wasm) targets. iOS is built
# only on macOS/Xcode and is therefore out of scope for this Linux runner.
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Token-safety guard (ADR-2)
        run: |
          set -euo pipefail
          # The JWT may be cleared ONLY from explicit logout — never from a 401 /
          # sync path — or we reintroduce the Chart35 silent-logout data loss.
          bad_clear=$(grep -rln "tokenStore.clear" composeApp/src --include=*.kt \
            | grep -v "ui/account/AccountViewModel.kt" || true)
          if [ -n "$bad_clear" ]; then
            echo "::error::TokenStore.clear() called outside logout: $bad_clear"; exit 1
          fi
          # No token should ever be written to a log.
          token_logs=$(grep -rniE "(println|Log\.[dewiv]|console\.log)\b[^;]*token" \
            composeApp/src --include=*.kt || true)
          if [ -n "$token_logs" ]; then
            echo "::error::possible token logging:"; echo "$token_logs"; exit 1
          fi
          echo "Token-safety guard passed."

      - name: Run common tests (merge laws, date vectors, serialization, migration)
        run: ./gradlew :composeApp:testDebugUnitTest --no-daemon --stacktrace

      - name: Assemble Android (debug)
        run: ./gradlew :androidApp:assembleDebug --no-daemon --stacktrace

      - name: Build web (Wasm) distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon --stacktrace
